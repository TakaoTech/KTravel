# =============================================================================
# COMPOSE RULES (io.nlopez.compose.rules)
# Specialized rules for Jetpack Compose / Compose Multiplatform
# =============================================================================
Compose:
  active: true
  # Naming Rules
  ComposableNaming:
    active: true
    # Ensure Composables use PascalCase naming convention
  PreviewNaming:
    active: true
    # Require "Preview" suffix for @Preview functions
    previewPublicOnlyIfParams: true

  # Modifier Rules
  ModifierMissing:
    active: true
    # Flag public Composables without a Modifier parameter
    checkModifiersForVisibility: 'only_public'
  ModifierReused:
    active: true
    # Detect when a modifier is passed to multiple children
  ModifierWithoutDefault:
    active: true
    # Ensure Modifier parameter has a default value
  ModifierNotUsedAtRoot:
    active: true
    # Check that modifier is applied to the root composable
  ModifierComposable:
    active: true
    # Check for Composable modifiers being created

  # Stability Rules
  UnstableCollections:
    active: true
    # Flag unstable collection parameters in Composables (List, Set, Map)

  # State Rules
  RememberMissing:
    active: true
    # Flag when remember is potentially missing
  RememberContentMissing:
    active: true
    # Check for missing rememberSaveable
  MutableParams:
    active: true
    # Avoid mutable parameters in Composables

  # Content Emitter Rules
  ContentEmitterReturningValues:
    active: true
    # Check content emitter patterns
  MultipleContentEmitters:
    active: true
    # Avoid multiple content emitters in the same composable
    # Helps catch issues with multiple lazy columns/rows

  # Parameter Ordering
  ComposableParamOrder:
    active: true
    # Ensure proper parameter ordering: required, optional with defaults, modifier, trailing lambdas

  # Lambda Rules
  LambdaParameterInRestartableEffect:
    active: true
    # Check for lambda parameters in restartable effects
  CompositionLocalAllowlist:
    active: false
    # Allowlist specific CompositionLocals

  # View Model Rules
  ViewModelForwarding:
    active: true
    # Flag when ViewModel is passed to child composables
  ViewModelInjection:
    active: true
    # Check ViewModel injection patterns

  # Material Design Rules
  Material2:
    active: false
    # Disable Material2 specific checks (using Material3)

  # Default Immutable Check
  DefaultsVisibility:
    active: false
    # Check visibility of defaults objects
