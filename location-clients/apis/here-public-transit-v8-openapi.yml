openapi: 3.0.2
info:
  title: Public Transit API v8
  description: |
    Public Transit is a set of three REST APIs that provides public transit
    routing information and public transit stations information available within
    an area or for a given station.
  termsOfService: https://legal.here.com/en-gb/terms
  license:
    name: HERE Documentation License
    url: https://legal.here.com/en-gb/terms/documentation-license
  version: 8.0.1
servers:
  - url: https://transit.hereapi.com/v8
    description: "All Public Transit services, namely Routing, Next Departures, and\
    \ Station Search."
security:
  - Bearer: [ ]
  - ApiKey: [ ]
paths:
  /routes:
    get:
      tags:
        - Routing
      summary: Routes
      description: |
        Lists public transit routes.
        The service supports several use cases as follows:

          * define routes based on arrival or departure times.
          * filter specific transit modes, such as rail and metro only.
          * plan routes hours or days in advance.
          * set a maximum distance for the walk to the nearest transit stop/station or the speed of the walk.
          * define how many changes or transfers the journey may include.
          * request turn-by-turn navigation.
          * request route polyline in order to view the route over a map.
      operationId: getRoutes
      parameters:
        - name: origin
          in: query
          description: |+
            Trip origin WGS-84 compliant coordinates.
            
            Format: `{lat},{lng}[;placeName={name}]`
            
            The optional `placeName` parameter can be used to customize
              the name of the origin place and will affect the generated actions descriptions.

          required: true
          style: form
          explode: true
          schema:
            $ref: '#/components/schemas/LocationString'
        - name: destination
          in: query
          description: |+
            Trip destination WGS-84 compliant coordinates.
            
            Format: `{lat},{lng}[;placeName={name}]`
            
            The optional `placeName` parameter can be used to customize the
              name of the destination place and will affect the generated actions descriptions.

          required: true
          style: form
          explode: true
          schema:
            $ref: '#/components/schemas/LocationString'
        - name: lang
          in: query
          description: |
            Specifies the list of preferred languages of the response.
            The first supported language from the list will be used for the response.
            The value should comply with the [IETF BCP 47](https://www.rfc-editor.org/rfc/bcp/bcp47.txt).
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
            default:
              - en-US
          example:
            - zh-tw
            - en-gb
            - en-us
        - name: units
          in: query
          description: |
            Units of measurement used, for example, in guidance instructions. The default is `metric`.
            
            If `imperial` units are requested and the requested language is `en-US`, then
            United States customary units (miles and feet) will be used.
            If `imperial` units are requested and a language other than `en-US` is requested then
            imperial (miles and yards) units will be used.
          required: false
          style: form
          explode: true
          schema:
            $ref: '#/components/schemas/Units'
        - name: departureTime
          in: query
          description: |
            Specifies the time of departure as defined by either `date-time` or `full-date` `T` `partial-time` in `RFC 3339`, section 5.6 (for example, `2019-06-24T01:23:45`).
            The requested time is converted to the local time at origin. When the optional timezone offset is
            not specified, time is assumed to be local. If neither `departureTime` or `arrivalTime` are specified, current time at departure location will be used.
            All `Time` values in the response are returned in the timezone of each location.
          required: false
          style: form
          explode: true
          allowReserved: true
          schema:
            $ref: '#/components/schemas/Time'
        - name: arrivalTime
          in: query
          description: |
            Specifies the time of arrival as defined by either `date-time` or `full-date` `T` `partial-time` in `RFC 3339`, section 5.6 (for example, `2019-06-24T01:23:45`).
            The requested time is converted to the local time at destination. When the optional timezone offset is
            not specified, time is assumed to be local.
            All `Time` values in the response are returned in the timezone of each location.
            
            Note : The following features do not support the arrivalTime parameter:
            * EV Routing
            * Route Handle
            * Route Import
          required: false
          style: form
          explode: true
          allowReserved: true
          schema:
            $ref: '#/components/schemas/Time'
        - name: alternatives
          in: query
          description: |
            Number of alternative routes to return aside from the optimal route. By default, `alternatives=0` is assumed and only one optimal route is returned. In cases where also a pedestrian route is available it will be also returned. This may lead to two routes being returned in total (one transit route and one pedestrian route) even though only one is expected when `alternatives=0` is given.
          required: false
          style: form
          explode: true
          schema:
            maximum: 5
            minimum: 0
            type: integer
            default: 0
        - name: changes
          in: query
          description: |
            Maximum number of changes or transfers allowed in a route. Unlimited number of changes is permitted when not set.
          required: false
          style: form
          explode: true
          schema:
            maximum: 6
            minimum: 0
            type: integer
        - name: modes
          in: query
          description: |
            Transit mode filter used to determine which modes of transit to include in the response.
            By default, all supported transit modes are permitted.
            
            Supported modes: `highSpeedTrain` `intercityTrain` `interRegionalTrain` `regionalTrain` `cityTrain`
            `bus` `ferry` `subway` `lightRail` `privateBus` `inclined` `aerial` `busRapid` `monorail`
            `flight`
            
            This parameter also support an exclusion list: It's sufficient to specify each mode to exclude by prefixing it with `-`.
            Mixing of inclusive and exclusive transit modes is not allowed.
            
            examples:
              * `subway,bus`. Returns only subways and busses.
              * `-subway,-bus`. Returns all modes except subways and busses.
          required: false
          style: form
          explode: false
          schema:
            $ref: '#/components/schemas/TransitModesFilter'
        - name: "pedestrian[speed]"
          in: query
          description: |
            Walking speed in meters per second. Influences the duration of walking segments from origin to a station, from a station to destination and in-between the stations (e.g. if transfer is needed).
          required: false
          style: form
          explode: true
          schema:
            $ref: '#/components/schemas/PedestrianSpeed'
        - name: "pedestrian[maxDistance]"
          in: query
          description: Maximum allowed walking distance in meters (e.g. when looking
            for nearest stations).
          required: false
          style: form
          explode: true
          schema:
            maximum: 6000
            minimum: 0
            type: integer
            default: 2000
        - name: accessibility
          in: query
          description: |
            Defines accessibility requirements for routes.
            
             * `wheelchair` - Select only wheelchair accessible vehicles and stations.
          required: false
          style: form
          explode: false
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              enum:
                - wheelchair
        - name: return
          in: query
          description: "Defines which section attributes are included.\n\n * `intermediate`\
          \ - List of intermediate stops within a section of the route. If\n   enabled,\
          \ the response includes `intermediateStops` attribute. Each intermediate\
          \ stop includes\n   stop/station names, WGS-84 geocoordinates, and the departure\
          \ times at the stops.\n * `fares` - List of fares/tickets to cover a section\
          \ of the route.\n\n   **NOTE**: Fares information support will be available\
          \ soon.\n * `polyline` - Polyline for the route in\n   [Flexible Polyline](https://github.com/heremaps/flexible-polyline/blob/master/README.md)\n\
          \   Encoding.\n * `actions` - Actions (such as maneuvers or tasks) that\
          \ must be taken to complete the section.\n * `travelSummary` - Include summary\
          \ for the travel portion of the section.\n * `incidents` - Include a list\
          \ of all incidents applicable to each section.\n * `bookingLinks` - Include\
          \ a list of links to book a ride for a section of the route.\n * `nextDepartures`\
          \ - Return the next departures for the transit section.\n * `sourceFeedMapping`\
          \ - Include a list of source feed data that matches the data of the section.\n\
          \ * `serviceTimes` - Include service times for the transit section.\n  \
          \  \n    **NOTE:** serviceTimes is an experimental feature and may not return\
          \ accurate results for all routes.\n"
          required: false
          style: form
          explode: false
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              enum:
                - intermediate
                - fares
                - polyline
                - actions
                - travelSummary
                - incidents
                - bookingLinks
                - nextDepartures
                - sourceFeedMapping
                - serviceTimes
        - name: X-Request-ID
          in: header
          description: User-provided token that can be used to trace a request or a
            group of requests sent to the service.
          required: false
          style: simple
          explode: false
          schema:
            type: string
      responses:
        "200":
          description: API response in case of success
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/X-Correlation-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransitRouteResponse'
        "400":
          description: API response in case of bad request.
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/X-Correlation-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                errorResponseExample:
                  $ref: '#/components/examples/400errorResponseExample'
        "401":
          description: API response in case of unauthorized access.
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/X-Correlation-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponseSchema'
              examples:
                errorResponseExample:
                  $ref: '#/components/examples/401errorResponseExample'
        "403":
