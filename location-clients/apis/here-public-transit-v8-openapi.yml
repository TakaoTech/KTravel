          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                errorResponseExample:
                  $ref: '#/components/examples/504errorResponseExample'
      servers:
        - url: https://transit.router.hereapi.com/v8
          description: Public Transit Routing service only.
        - url: https://transit.hereapi.com/v8
          description: "All Public Transit services, namely Routing, Next Departures,\
          \ and Station Search."
  /departures:
    get:
      tags:
        - Next Departures
      summary: Departures
      description: |
        Lists public transit departures.
        Discovers subsequent departures using structured or topological queries.
        The service accepts two types of queries as shown in the table below:

        | Query | Parameter | Description |
        |-------|-----------|-------------|
        | Departures by IDs | `ids` | takes a comma-separated list of station/stop identifiers |
        | Departures by Location | `in` | takes a pair of coordinates to define the center and a radius to define the extent of a circular area where to search for departures |

        Select a query from `one of` the options above to visualize the request parameters.
      operationId: getDepartures
      parameters:
        - name: boardOptions
          in: query
          description: Board options
          required: false
          style: form
          explode: true
          schema:
            $ref: '#/components/schemas/boardOptions'
        - name: time
          in: query
          description: |
            Specifies the time of earliest departure in `RFC 3339`, section 5.6 as defined by either `date-time` or `full-date` "T" `partial-time` (for example, `2019-06-24T01:23:45`).
            The requested time is converted to local time at each location. When the optional timezone offset is
            not specified, time is assumed to be local. If `time` is not specified, current time at departure place will be used.
            All `Time` values in the response are returned in the timezone of each location.
          required: false
          style: form
          explode: true
          schema:
            $ref: '#/components/schemas/Time'
        - name: modes
          in: query
          description: |
            Transit mode filter used to determine which modes of transit to include in the response.
            By default, all supported transit modes are permitted.
            
            Supported modes: `highSpeedTrain` `intercityTrain` `interRegionalTrain` `regionalTrain` `cityTrain`
            `bus` `ferry` `subway` `lightRail` `privateBus` `inclined` `aerial` `busRapid` `monorail`
            `flight`
            
            This parameter also support an exclusion list: It's sufficient to specify each mode to exclude by prefixing it with `-`.
            Mixing of inclusive and exclusive transit modes is not allowed.
            
            examples:
              * `subway,bus`. Returns only subways and busses.
              * `-subway,-bus`. Returns all modes except subways and busses.
          required: false
          style: form
          explode: false
          schema:
            $ref: '#/components/schemas/TransitModesFilter'
        - name: maxPerBoard
          in: query
          description: The maximum number of subsequent departures per station board
            the response is to include.
          required: false
          style: form
          explode: true
          schema:
            maximum: 50
            minimum: 1
            type: integer
            default: 5
        - name: maxPerTransport
          in: query
          description: |
            The maximum number of subsequent departures per transport returned in the response. A transport is identified by its name, direction and mode. When not set, all departures are returned, otherwise the first `maxPerTransport` departures for each transport in chronological order are returned.
          required: false
          style: form
          explode: true
          schema:
            maximum: 10
            minimum: 1
            type: integer
            nullable: true
        - name: sort
          in: query
          description: |
            Define how the departures are sorted. By default, the departures are returned sorted by scheduled time.
            When `sort=transport`, the departures are sorted first by transport and then by scheduled time.
            
            * `sort=time`: means sorted by time.
            * `sort=transport`: means that we sort by `name`, `headsign`, `mode` and `time` in this order.
          required: false
          style: form
          explode: true
          schema:
            type: string
            default: time
            enum:
              - time
              - transport
        - name: timespan
          in: query
          description: |
            Limit the subsequent departures to the defined time window and starting from the time provided in the request. When not set, this filter is not applied and a maximum of 24 hours of departures can be returned. The filter will remove all departures outside the interval defined by time and time span.
          required: false
          style: form
          explode: true
          schema:
            $ref: '#/components/schemas/timespan'
        - name: lang
          in: query
          description: |
            Specifies the list of preferred languages of the response.
            The first supported language from the list will be used for the response.
            The value should comply with the [IETF BCP 47](https://www.rfc-editor.org/rfc/bcp/bcp47.txt).
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
            default:
              - en-US
          example:
            - zh-tw
            - en-gb
            - en-us
        - name: accessibility
          in: query
          description: |
            Defines accessibility requirements for routes.
            
             * `wheelchair` - Select only wheelchair accessible vehicles and stations.
          required: false
          style: form
          explode: false
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              enum:
                - wheelchair
        - name: X-Request-ID
          in: header
          description: User-provided token that can be used to trace a request or a
            group of requests sent to the service.
          required: false
          style: simple
          explode: false
          schema:
            type: string
      responses:
        "200":
          description: API response in case of success
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/X-Correlation-Id'
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationBoardResponse'
        "400":
          description: API response in case of bad request.
          headers:
