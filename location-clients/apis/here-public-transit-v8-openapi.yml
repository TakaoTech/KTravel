          example: carrideco-1753076078174759852-1749341260512683512
        name:
          type: string
          description: Name of a fare
          example: Carride Company
        price:
          $ref: '#/components/schemas/FarePrice'
        reason:
          type: string
          description: "Extensible enum: `ride` `parking` `...`  \nReason for the\
            \ cost described in this `Fare` element.\n"
          default: ride
          x-extensible-enum:
            - ride
            - parking
      description: |
        "`Fare` type contains information about a single fare or ticket needed for this section of the route."

        **NOTE**: Fares information support will be available soon.
    ParkingLotPlace:
      required:
        - location
