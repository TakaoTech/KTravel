  parameters:
    accessibility:
      name: accessibility
      in: query
      description: |
        Defines accessibility requirements for routes.

         * `wheelchair` - Select only wheelchair accessible vehicles and stations.
      required: false
      style: form
      explode: false
      schema:
        uniqueItems: true
        type: array
        items:
          type: string
          enum:
            - wheelchair
    alternatives:
      name: alternatives
      in: query
      description: |
        Number of alternative routes to return aside from the optimal route. By default, `alternatives=0` is assumed and only one optimal route is returned. In cases where also a pedestrian route is available it will be also returned. This may lead to two routes being returned in total (one transit route and one pedestrian route) even though only one is expected when `alternatives=0` is given.
      required: false
      style: form
      explode: true
      schema:
        maximum: 5
        minimum: 0
        type: integer
        default: 0
    arrivalTime:
      name: arrivalTime
      in: query
      description: |
        Specifies the time of arrival as defined by either `date-time` or `full-date` `T` `partial-time` in `RFC 3339`, section 5.6 (for example, `2019-06-24T01:23:45`).
        The requested time is converted to the local time at destination. When the optional timezone offset is
        not specified, time is assumed to be local.
        All `Time` values in the response are returned in the timezone of each location.

        Note : The following features do not support the arrivalTime parameter:
        * EV Routing
        * Route Handle
        * Route Import
      required: false
      style: form
      explode: true
      allowReserved: true
      schema:
        $ref: '#/components/schemas/Time'
    boardOptions:
      name: boardOptions
      in: query
      description: Board options
      required: false
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/boardOptions'
    boardSort:
      name: sort
      in: query
      description: |
        Define how the departures are sorted. By default, the departures are returned sorted by scheduled time.
        When `sort=transport`, the departures are sorted first by transport and then by scheduled time.

        * `sort=time`: means sorted by time.
        * `sort=transport`: means that we sort by `name`, `headsign`, `mode` and `time` in this order.
      required: false
      style: form
      explode: true
      schema:
        type: string
        default: time
        enum:
          - time
          - transport
    boardTime:
      name: time
      in: query
      description: |
        Specifies the time of earliest departure in `RFC 3339`, section 5.6 as defined by either `date-time` or `full-date` "T" `partial-time` (for example, `2019-06-24T01:23:45`).
        The requested time is converted to local time at each location. When the optional timezone offset is
        not specified, time is assumed to be local. If `time` is not specified, current time at departure place will be used.
        All `Time` values in the response are returned in the timezone of each location.
      required: false
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/Time'
    changes:
      name: changes
      in: query
      description: |
        Maximum number of changes or transfers allowed in a route. Unlimited number of changes is permitted when not set.
      required: false
      style: form
      explode: true
      schema:
        maximum: 6
        minimum: 0
        type: integer
    departureTime:
      name: departureTime
      in: query
      description: |
        Specifies the time of departure as defined by either `date-time` or `full-date` `T` `partial-time` in `RFC 3339`, section 5.6 (for example, `2019-06-24T01:23:45`).
        The requested time is converted to the local time at origin. When the optional timezone offset is
        not specified, time is assumed to be local. If neither `departureTime` or `arrivalTime` are specified, current time at departure location will be used.
        All `Time` values in the response are returned in the timezone of each location.
      required: false
      style: form
      explode: true
      allowReserved: true
      schema:
        $ref: '#/components/schemas/Time'
    destination:
      name: destination
      in: query
      description: |+
        Trip destination WGS-84 compliant coordinates.

        Format: `{lat},{lng}[;placeName={name}]`

        The optional `placeName` parameter can be used to customize the
          name of the destination place and will affect the generated actions descriptions.

      required: true
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/LocationString'
    lang:
      name: lang
      in: query
      description: |
        Specifies the list of preferred languages of the response.
        The first supported language from the list will be used for the response.
        The value should comply with the [IETF BCP 47](https://www.rfc-editor.org/rfc/bcp/bcp47.txt).
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
        default:
          - en-US
      example:
        - zh-tw
        - en-gb
        - en-us
    maxPerBoard:
      name: maxPerBoard
      in: query
      description: The maximum number of subsequent departures per station board the
        response is to include.
      required: false
      style: form
      explode: true
      schema:
        maximum: 50
        minimum: 1
        type: integer
        default: 5
    maxPerTransport:
      name: maxPerTransport
      in: query
      description: |
        The maximum number of subsequent departures per transport returned in the response. A transport is identified by its name, direction and mode. When not set, all departures are returned, otherwise the first `maxPerTransport` departures for each transport in chronological order are returned.
      required: false
      style: form
      explode: true
      schema:
        maximum: 10
        minimum: 1
        type: integer
        nullable: true
    origin:
      name: origin
      in: query
      description: |+
        Trip origin WGS-84 compliant coordinates.

        Format: `{lat},{lng}[;placeName={name}]`

        The optional `placeName` parameter can be used to customize
          the name of the origin place and will affect the generated actions descriptions.

      required: true
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/LocationString'
    pedestrianMaxDistance:
      name: "pedestrian[maxDistance]"
      in: query
      description: Maximum allowed walking distance in meters (e.g. when looking for
        nearest stations).
      required: false
      style: form
      explode: true
      schema:
        maximum: 6000
        minimum: 0
        type: integer
        default: 2000
    pedestrianSpeed:
      name: "pedestrian[speed]"
      in: query
      description: |
        Walking speed in meters per second. Influences the duration of walking segments from origin to a station, from a station to destination and in-between the stations (e.g. if transfer is needed).
      required: false
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/PedestrianSpeed'
    placesReturn:
      name: return
      in: query
      description: |
        Defines which place attributes are included.

         * `transport` - List of transports.
         * `accessPoints` - List of access points.
      required: false
      style: form
      explode: false
      schema:
        $ref: '#/components/schemas/PlacesReturn'
    stationOptions:
      name: stationOptions
      in: query
      description: Station filter
      required: false
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/StationOptions'
    timespan:
      name: timespan
      in: query
      description: |
        Limit the subsequent departures to the defined time window and starting from the time provided in the request. When not set, this filter is not applied and a maximum of 24 hours of departures can be returned. The filter will remove all departures outside the interval defined by time and time span.
      required: false
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/timespan'
    transitModes:
      name: modes
      in: query
      description: |
        Transit mode filter used to determine which modes of transit to include in the response.
        By default, all supported transit modes are permitted.

        Supported modes: `highSpeedTrain` `intercityTrain` `interRegionalTrain` `regionalTrain` `cityTrain`
        `bus` `ferry` `subway` `lightRail` `privateBus` `inclined` `aerial` `busRapid` `monorail`
        `flight`

        This parameter also support an exclusion list: It's sufficient to specify each mode to exclude by prefixing it with `-`.
        Mixing of inclusive and exclusive transit modes is not allowed.

        examples:
          * `subway,bus`. Returns only subways and busses.
          * `-subway,-bus`. Returns all modes except subways and busses.
      required: false
      style: form
      explode: false
      schema:
        $ref: '#/components/schemas/TransitModesFilter'
    transitReturn:
      name: return
      in: query
      description: "Defines which section attributes are included.\n\n * `intermediate`\
        \ - List of intermediate stops within a section of the route. If\n   enabled,\
        \ the response includes `intermediateStops` attribute. Each intermediate stop\
        \ includes\n   stop/station names, WGS-84 geocoordinates, and the departure\
        \ times at the stops.\n * `fares` - List of fares/tickets to cover a section\
        \ of the route.\n\n   **NOTE**: Fares information support will be available\
        \ soon.\n * `polyline` - Polyline for the route in\n   [Flexible Polyline](https://github.com/heremaps/flexible-polyline/blob/master/README.md)\n\
        \   Encoding.\n * `actions` - Actions (such as maneuvers or tasks) that must\
        \ be taken to complete the section.\n * `travelSummary` - Include summary\
        \ for the travel portion of the section.\n * `incidents` - Include a list\
        \ of all incidents applicable to each section.\n * `bookingLinks` - Include\
        \ a list of links to book a ride for a section of the route.\n * `nextDepartures`\
        \ - Return the next departures for the transit section.\n * `sourceFeedMapping`\
        \ - Include a list of source feed data that matches the data of the section.\n\
        \ * `serviceTimes` - Include service times for the transit section.\n    \n\
        \    **NOTE:** serviceTimes is an experimental feature and may not return\
        \ accurate results for all routes.\n"
      required: false
      style: form
      explode: false
      schema:
        uniqueItems: true
        type: array
        items:
          type: string
          enum:
            - intermediate
            - fares
            - polyline
            - actions
            - travelSummary
            - incidents
            - bookingLinks
            - nextDepartures
            - sourceFeedMapping
            - serviceTimes
    units:
      name: units
      in: query
      description: |
        Units of measurement used, for example, in guidance instructions. The default is `metric`.

        If `imperial` units are requested and the requested language is `en-US`, then
        United States customary units (miles and feet) will be used.
        If `imperial` units are requested and a language other than `en-US` is requested then
        imperial (miles and yards) units will be used.
      required: false
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/Units'
    xRequestId:
      name: X-Request-ID
      in: header
      description: User-provided token that can be used to trace a request or a group
        of requests sent to the service.
      required: false
      style: simple
      explode: false
      schema:
        type: string
